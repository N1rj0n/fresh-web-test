# This file was configured to deploy your app to Firebase Hosting on merge to main
name: Deploy to Firebase Hosting on merge
on:
  push:
    branches:
      - main
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: npm ci
      - name: Build site
        run: npm run build
      - name: Deploy to Firebase Hosting
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          echo "$FIREBASE_SERVICE_ACCOUNT" > service-account.json
          export GOOGLE_APPLICATION_CREDENTIALS=service-account.json
          
          # Deploy and capture output to handle the "already active version" API bug
          DEPLOY_OUTPUT=$(npx firebase-tools deploy --only hosting --project new-fresh-start-web-test 2>&1)
          DEPLOY_STATUS=$?
          echo "$DEPLOY_OUTPUT"
          
          # Clean up credentials
          rm service-account.json
          
          # Handle exit status
          if [ $DEPLOY_STATUS -ne 0 ]; then
            if echo "$DEPLOY_OUTPUT" | grep -q "is the current active version"; then
              echo "Firebase deployment completed successfully (the active release on Firebase is already up-to-date)."
              exit 0
            else
              exit $DEPLOY_STATUS
            fi
          fi

